  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --ink-mid: #555;
    --ink-light: #6b6b6b;
    --rule: #d8d2c8;
    --bg: #f9f7f4;
    --bg-white: #ffffff;
    --accent: #8b6f4e;
    --accent-light: #f2ede7;
  }

  html { font-size: 16px; background: var(--bg); color: var(--ink); }
  body { font-family: 'Noto Sans JP', sans-serif; font-weight: 300; min-height: 100vh; }
  a { color: inherit; text-decoration: none; }

  header {
    border-bottom: 0.5px solid var(--rule);
    padding: 2rem 3rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1.5rem;
    background: var(--bg-white);
  }
  .logo { font-family: 'Cormorant Garamond', 'Shippori Mincho', 'Yu Mincho', 'Hiragino Mincho ProN', serif; font-weight: 300; font-size: 1.5rem; letter-spacing: 0.1em; }
  .logo span { font-style: italic; color: var(--accent); white-space: nowrap; }
  .header-sub { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--ink-light); text-transform: uppercase; }

  main { max-width: 760px; margin: 0 auto; padding: 4rem 2rem 6rem; }

  .page-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }
  .page-title {
    font-family: 'Cormorant Garamond', 'Shippori Mincho', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
    font-weight: 300;
    font-size: 2.4rem;

  .form-section { margin-bottom: 2.75rem; }
  .section-label {
    font-size: 0.62rem;

    text-transform: uppercase;

    margin-bottom: 1.25rem;
    padding-bottom: 0.5rem;

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

  .field label { font-size: 0.72rem; font-weight: 500; color: var(--ink-mid); letter-spacing: 0.05em; }
  .field select, .field textarea, .field input[type="text"], .field input[type="email"], .field input[type="tel"], .field input[type="date"] {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--ink);
    background: var(--bg-white);
    border: 0.5px solid var(--rule);
    border-radius: 2px;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field select:focus, .field textarea:focus, .field input:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 90px; line-height: 1.7; }

  /* Radio choice group */
  .choice-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .choice-option {
    border: 0.5px solid var(--rule);
    border-radius: 2px;
    padding: 0.9rem 1.1rem;
    background: var(--bg-white);
    transition: border-color 0.2s;
  }
  .choice-option.active { border-color: var(--accent); background: var(--accent-light); }
  .choice-label {

  .choice-option.active .choice-detail { display: block; }
  .choice-detail textarea {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--ink);
    background: var(--bg-white);
    border: 0.5px solid var(--rule);
    border-radius: 2px;
    padding: 0.7rem 0.9rem;
    outline: none;
    width: 100%;
    resize: vertical;
    min-height: 60px;
    line-height: 1.7;
  }
  .choice-detail textarea:focus { border-color: var(--accent); }

  .caution-note {
    font-size: 0.7rem;
    color: var(--accent);

  .submit-btn {
    font-family: 'Noto Sans JP', sans-serif;

  @media (max-width: 600px) {
    header { padding: 1.25rem 1.5rem; }

</style>
</head>
<body>

<header>
  <div class="logo"><a href="trend_fire_source_top.html">Trend<span> Fire Source</span></a></div>
  <div class="header-sub">Application Form</div>
</header>

<main>
  <p class="page-eyebrow">Plan B — 分析＋実行支援</p>
  <h1 class="page-title">サービス内容ご相談フォーム</h1>
  <p class="page-desc">
    実行支援(タレント・インフルエンサー、制作スタッフの選定／ブッキング)の詳細をお伺いします。ご希望内容をもとに、お見積もりをご案内いたします。
  </p>

  <div class="form-section">
    <p class="section-label">ご連絡先</p>
    <div class="grid-2">
      <div class="field">
        <label>会社名・屋号</label>
        <input type="text" placeholder="例：株式会社◯◯">
      </div>
      <div class="field">
        <label>ご担当者名</label>
        <input type="text" placeholder="例：山田 太郎">
      </div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" placeholder="例：you@company.co.jp">
      </div>
      <div class="field">
        <label>電話番号（任意）</label>
        <input type="tel" placeholder="例：03-0000-0000">
      </div>
    </div>
  </div>

  <div class="form-section">
    <p class="section-label">前提情報</p>
    <div class="field">
      <label>お申し込みプラン・レポートID</label>
      <input type="text" placeholder="例：PRI-2406-0091">
    </div>
  </div>

  <div class="form-section">
    <p class="section-label">タレント・インフルエンサーについて</p>
    <div class="choice-group" data-group="talent">
      <label class="choice-option active">
        <span class="choice-label"><input type="radio" name="talent" value="omakase" checked>Trend Fire Sourceにお任せ</span>
      </label>
      <label class="choice-option">
        <span class="choice-label"><input type="radio" name="talent" value="image">お願いしたい人のイメージ記述</span>
        <div class="choice-detail">
          <textarea placeholder="例：30代女性、ナチュラルな雰囲気で美容感度の高い層に信頼されているタイプ"></textarea>
        </div>
      </label>
      <label class="choice-option">
        <span class="choice-label"><input type="radio" name="talent" value="specific">具体名の記述</span>
        <div class="choice-detail">
          <textarea placeholder="例：◯◯さん、△△さん（複数可）"></textarea>
          <p class="caution-note">ご指名の人物が予算内に収まらないこともあります。</p>
        </div>
      </label>
    </div>
  </div>

  <div class="form-section">
    <p class="section-label">制作スタッフについて</p>
    <div class="choice-group" data-group="staff">
      <label class="choice-option active">
        <span class="choice-label"><input type="radio" name="staff" value="omakase" checked>Trend Fire Sourceにお任せ</span>
      </label>
      <label class="choice-option">
        <span class="choice-label"><input type="radio" name="staff" value="image">お願いしたい人のイメージ記述</span>
        <div class="choice-detail">
          <textarea placeholder="例：ナチュラル系の撮影を得意とするカメラマン、シンプルなヘアメイク"></textarea>
        </div>
      </label>
      <label class="choice-option">
        <span class="choice-label"><input type="radio" name="staff" value="specific">具体名の記述</span>
        <div class="choice-detail">
          <textarea placeholder="例：◯◯さん（カメラマン）、△△さん（ヘアメイク）"></textarea>
          <p class="caution-note">ご指名の人物が予算内に収まらないこともあります。</p>
        </div>
      </label>
    </div>
  </div>

  <div class="form-section">
    <p class="section-label">予算・スケジュール</p>
    <div class="grid-2">
      <div class="field">
        <label>予算レンジ（ギャランティ込み目安）</label>
        <select>
          <option value="">選択してください</option>
          <option>¥300,000 〜 ¥500,000</option>
          <option>¥500,000 〜 ¥1,000,000</option>
          <option>¥1,000,000 〜 ¥3,000,000</option>
          <option>¥3,000,000 〜</option>
        </select>
      </div>
      <div class="field">
        <label>ブッキング・撮影希望時期</label>
        <input type="text" placeholder="例：2026年9月上旬">
      </div>
    </div>
  </div>

  <div class="form-section">
    <p class="section-label">その他</p>
    <div class="field">
      <label>ご要望・お悩み</label>
      <textarea placeholder="その他ご要望があればご記入ください。"></textarea>
    </div>
  </div>

  <div class="submit-area">
    <p class="submit-note">
      内容確認の上、3営業日以内に担当者よりお見積もりをご案内いたします。
    </p>
    <a href="application_form_complete.html" class="submit-btn">ご相談内容を送信する →</a>
  </div>
</main>

<script>
  document.querySelectorAll('.choice-group').forEach(function(group) {
    var options = group.querySelectorAll('.choice-option');
    options.forEach(function(opt) {
      var radio = opt.querySelector('input[type="radio"]');
      radio.addEventListener('change', function() {
        options.forEach(function(o) { o.classList.remove('active'); });
        opt.classList.add('active');
      });
    });
  });
</script>

</body>
</html>
